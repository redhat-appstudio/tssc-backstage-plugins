name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to set in package.json (e.g. 1.9)"
        required: true
        type: string
      backstage_target:
        description: "General version of Backstage you want to bump to (e.g. 1.45). Only use (MAJOR.MINOR) values."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn

      - name: bump plugins
        env:
          # Needed for API rate limits
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          BACKSTAGE_TARGET: ${{ inputs.backstage_target }}
        run: |
          yarn tsx utils/bump-plugins.ts \
            --target "$BACKSTAGE_TARGET" \
            --debug

      - name: Install plugin updates
        run: yarn install --mode=update-lockfile

      - name: Update package.json file
        env:
          VERSION: ${{ inputs.version }}
          BACKSTAGE_TARGET: ${{ inputs.backstage_target }}
        run: |
          yarn tsx utils/update-package-json.ts \
            --version "$VERSION" \
            --target "$BACKSTAGE_TARGET"

      - name: Update Containerfile
        env:
          VERSION: ${{ inputs.version }}
        run: |
          yarn tsx utils/update-container-release-version.ts \
            --version "$VERSION"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          # Github bot: https://api.github.com/users/github-actions%5Bbot%5D
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: release-${{ inputs.version }}
          title: "chore(release-${{inputs.version}}): Bump Plugins"
          body: |
            This PR was automatically generated by a GitHub Actions workflow.

            Bump TSSC Backstage Plugins for Release ${{ inputs.version }}.

            This release targets Backstage version ${{ inputs.backstage_target }}.
          commit-message: "chore(release-${{inputs.version}}): Bump Plugins"
          labels: automated, release, tssc-${{ inputs.version }}, backstage-${{ inputs.backstage_target }}, bump-plugins
          delete-branch: true
          # What to commit
          add-paths: |
            package.json
            plugins/**
            Containerfile
            yarn.lock
