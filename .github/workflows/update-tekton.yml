name: Update Tekton Pipelines

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update .tekton files for (e.g. 1.9)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-tekton:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate version is not current release
        env:
          VERSION: ${{ inputs.version }}
        run: |
          CURRENT_VERSION=$(jq -r '.version' package.json)
          if [ "$VERSION" = "$CURRENT_VERSION" ]; then
            echo "Error: Cannot update tekton pipelines for version $VERSION — it is already the current release."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn

      - name: Update .tekton files
        env:
          VERSION: ${{ inputs.version }}
        run: |
          yarn tsx utils/update-tkn-release-version.ts \
            --version "$VERSION"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          base: release-${{ inputs.version }}
          branch: tekton-update-${{ inputs.version }}
          title: "chore: update .tekton pipelines for release-${{ inputs.version }}"
          body: |
            This PR updates the Konflux CI pipeline configurations (`.tekton` files) for the `release-${{ inputs.version }}` branch.

            These changes configure the tekton pipelines to target the release branch instead of main.
          commit-message: "chore: update .tekton pipelines for release-${{ inputs.version }}"
          labels: automated,tekton-update
          add-paths: |
            .tekton/**
          delete-branch: true
